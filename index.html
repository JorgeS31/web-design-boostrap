<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completa tu Información · Bootstrap + Font Awesome</title>
    
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="./assets/css/boostrap.min.css">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">

        <div class="col-12 col-md-8 col-lg-6">

            <!-- Tarjeta -->
            <div class="card border-0 shadow-lg p-4 p-md-5">

                <div class="card-body">

                    <!-- Título -->
                    <h1 class="text-center mb-2 fw-bold">
                        <i class="fas fa-edit text-primary me-2"></i>
                        Completa tu Información
                    </h1>

                    <!-- Subtítulo -->
                    <p class="text-center text-secondary mb-4">
                        <i class="fas fa-info-circle me-1"></i>
                        Por favor completa los siguientes datos:
                    </p>

                    <!-- Formulario -->
                    <form>

                        <!-- Nombre -->
                        <div class="mb-4">
                            <label for="nombre" class="form-label fw-semibold text-uppercase small">
                                <i class="fas fa-user-circle me-2 text-primary"></i>
                                Nombre Completo
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   id="nombre"
                                   placeholder="Ingresa tu nombre">
                        </div>

                        <!-- Correo -->
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold text-uppercase small">
                                <i class="fa-solid fa-envelope me-2 text-primary"></i>
                                Ingresa tu correo
                            </label>

                            <input type="email"
                                   class="form-control form-control-lg"
                                   id="email"
                                   placeholder="Ingresa tu correo">
                        </div>

                        <!-- Teléfono -->
                        <div class="mb-4">
                            <label for="telefono" class="form-label fw-semibold text-uppercase small">
                                <i class="fa-solid fa-phone-flip me-2 text-primary"></i>
                                Ingresa tu teléfono
                            </label>

                            <input type="tel"
                                   class="form-control form-control-lg"
                                   id="telefono"
                                   placeholder="Ingresa tu teléfono">
                        </div>

                        <!-- País -->
                        <div class="mb-4">
                            <label for="pais" class="form-label fw-semibold text-uppercase small">
                                <i class="fas fa-globe-americas me-2 text-primary"></i>
                                Selecciona tu País
                            </label>

                            <select class="form-select form-select-lg" id="pais">
                                <option selected disabled>— Selecciona un país —</option>
                                <option value="MX">🇲🇽 México</option>
                                <option value="ES">🇪🇸 España</option>
                                <option value="AR">🇦🇷 Argentina</option>
                                <option value="CO">🇨🇴 Colombia</option>
                                <option value="PE">🇵🇪 Perú</option>
                                <option value="CL">🇨🇱 Chile</option>
                                <option value="US">🇺🇸 Estados Unidos</option>
                            </select>
                        </div>

                        <!-- Mensaje -->
                        <div class="mb-4">
                            <label for="mensaje" class="form-label fw-semibold text-uppercase small">
                                <i class="fas fa-comment-dots me-2 text-primary"></i>
                                Mensaje
                            </label>

                            <textarea class="form-control form-control-lg"
                                      id="mensaje"
                                      rows="4"
                                      placeholder="Escribe tu mensaje..."></textarea>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex gap-3 justify-content-end">

                            <button type="button"
                                    class="btn btn-outline-secondary btn-lg px-5">

                                <i class="fas fa-times-circle me-2"></i>
                                Cancelar
                            </button>

                            <button type="submit"
                                    class="btn btn-primary btn-lg px-5">

                                <i class="fas fa-paper-plane me-2"></i>
                                Enviar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
